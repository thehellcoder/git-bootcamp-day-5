---
# Учебный плейбук — каркас. Задачи добавятся в следующих коммитах.
- name: WordPress deploy (scaffold)
  hosts: web
  become: true
  tasks:

  - name: Install MySQL server
    ansible.builtin.apt:
      name: mysql-server
      state: present

  - name: Create WordPress database
    community.mysql.mysql_db:
      name: "{{ wp_db_name }}"
      state: present

  - name: Create WordPress DB user
    community.mysql.mysql_user:
      name: "{{ wp_db_user }}"
      password: "{{ db_password }}"
      priv: "{{ wp_db_name }}.*:ALL"
      state: present

  - name: Install nginx and php-fpm
    ansible.builtin.apt:
      name:
        - nginx
        - php-fpm
      state: present

  - name: Deploy nginx virtual host
    ansible.builtin.template:
      src: nginx.conf.j2
      dest: /etc/nginx/sites-available/wordpress
      notify: Reload nginx

  - name: Deploy php-fpm pool config
    ansible.builtin.template:
      src: php-fpm.conf.j2
      dest: "/etc/php/{{ php_version }}/fpm/pool.d/wordpress.conf"
      notify: Restart php-fpm

  - name: Download WordPress
    ansible.builtin.get_url:
      url: "{{ wordpress_download_url }}"
      dest: /tmp/wordpress.tar.gz

  - name: Deploy wp-config.php
    ansible.builtin.template:
      src: wp-config.php.j2
      dest: /var/www/wordpress/wp-config.php
      mode: "0640"
